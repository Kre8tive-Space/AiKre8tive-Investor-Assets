#!/usr/bin/env python3

import os
import subprocess
import sys

# ZION DEPLOYER CORE

print("🚀 INITIATING ZION TOTAL DEPLOYMENT...")

REPO_URL = "https://github.com/CorrectUser/CorrectRepo.git"
PROJECT_DIR = "ai-metaverse-platform"
VENV_DIR = "venv"

def run_command(command, cwd=None):
    result = subprocess.run(command, shell=True, cwd=cwd)
    if result.returncode != 0:
        print(f"❌ ERROR running: {command}")
        sys.exit(1)

if not os.path.exists(PROJECT_DIR):
    print("📥 Cloning AiKre8tive repository...")
    run_command(f"git clone {REPO_URL}")
else:
    print("✅ Repository already exists.")

os.chdir(PROJECT_DIR)

if not os.path.exists(VENV_DIR):
    print("⚙️ Creating virtual environment...")
    run_command(f"python3 -m venv {VENV_DIR}")
    run_command(f"{VENV_DIR}/bin/pip install --upgrade pip")
else:
    print("✅ Virtual environment already exists.")

print("📦 Installing backend AI dependencies...")
run_command(f"{VENV_DIR}/bin/pip install sentence-transformers faiss-cpu flask fastapi uvicorn")

print("🧠 Indexing Vault Knowledge Base...")
run_command(f"{VENV_DIR}/bin/python3 notebook_loader.py")

print("🐳 Building Docker Containers...")
run_command("docker-compose up --build -d")

print("🎨 Building Matrix UI...")
ui_dir = os.path.join(os.getcwd(), "matrix_ui")
if os.path.exists(ui_dir):
    run_command("npm install", cwd=ui_dir)
    run_command("npm run build", cwd=ui_dir)
else:
    print("⚠️ UI Directory 'matrix_ui' not found, skipping UI build.")

print("✅ ZION DEPLOYMENT COMPLETE :: SYSTEM ONLINE")
print("🌐 Your AiKre8tive enterprise stack is fully deployed.")
